# HDMI Matrix — Mushroom dashboard
#
# Clean, modern look using Mushroom cards. Great middle ground between
# stock tiles and the full matrix grid.
#
# Requires (install via HACS → Frontend):
#   - Mushroom          (https://github.com/piitaya/lovelace-mushroom)
#   - card-mod          (https://github.com/thomasloven/lovelace-card-mod)  [optional, for theming]
#
# Paste into a view's Raw config editor.

type: vertical-stack
cards:
  - type: custom:mushroom-title-card
    title: HDMI Matrix
    subtitle: Route any source to any output
    icon: mdi:video-switch

  # --- Top bar: power, mute, preset recall ---
  - type: horizontal-stack
    cards:
      - type: custom:mushroom-entity-card
        entity: switch.hdmi_matrix_power
        name: Power
        icon: mdi:power
        icon_color: red
        tap_action:
          action: toggle
      - type: custom:mushroom-entity-card
        entity: button.hdmi_matrix_mute_all_outputs
        name: Mute all
        icon: mdi:volume-off
        icon_color: orange
        tap_action:
          action: call-service
          service: button.press
          target:
            entity_id: button.hdmi_matrix_mute_all_outputs
      - type: custom:mushroom-select-card
        entity: select.hdmi_matrix_recall_preset
        name: Recall preset
        icon: mdi:folder-play
        icon_color: purple

  # --- Per-output select cards (with source dropdown and icon) ---
  - type: grid
    columns: 2
    square: false
    cards:
      - type: custom:mushroom-select-card
        entity: select.hdmi_matrix_output_1
        icon: mdi:television
        icon_color: blue
      - type: custom:mushroom-select-card
        entity: select.hdmi_matrix_output_2
        icon: mdi:television
        icon_color: green
      - type: custom:mushroom-select-card
        entity: select.hdmi_matrix_output_3
        icon: mdi:television
        icon_color: amber
      - type: custom:mushroom-select-card
        entity: select.hdmi_matrix_output_4
        icon: mdi:television
        icon_color: pink

  # --- "Send all outputs to one input" ---
  - type: custom:mushroom-select-card
    entity: select.hdmi_matrix_all_outputs
    name: All outputs → input
    icon: mdi:video-switch
    icon_color: deep-orange

  # --- Save-preset action buttons ---
  - type: custom:mushroom-title-card
    title: Presets
    subtitle: Tap to save the current routing into a slot
  - type: grid
    columns: 4
    square: true
    cards:
      - type: custom:mushroom-template-card
        primary: Preset 1
        secondary: "{{ states('text.hdmi_matrix_preset_1_name') }}"
        icon: mdi:numeric-1-box
        icon_color: blue
        tap_action:
          action: call-service
          service: gofanco_prophecy.save_preset
          data:
            index: 1
      - type: custom:mushroom-template-card
        primary: Preset 2
        secondary: "{{ states('text.hdmi_matrix_preset_2_name') }}"
        icon: mdi:numeric-2-box
        icon_color: green
        tap_action:
          action: call-service
          service: gofanco_prophecy.save_preset
          data:
            index: 2
      - type: custom:mushroom-template-card
        primary: Preset 3
        secondary: "{{ states('text.hdmi_matrix_preset_3_name') }}"
        icon: mdi:numeric-3-box
        icon_color: amber
        tap_action:
          action: call-service
          service: gofanco_prophecy.save_preset
          data:
            index: 3
      - type: custom:mushroom-template-card
        primary: Preset 4
        secondary: "{{ states('text.hdmi_matrix_preset_4_name') }}"
        icon: mdi:numeric-4-box
        icon_color: pink
        tap_action:
          action: call-service
          service: gofanco_prophecy.save_preset
          data:
            index: 4
