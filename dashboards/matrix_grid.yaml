# HDMI Matrix — grid dashboard (rows = outputs, columns = inputs)
#
# Top row uses vertical mushroom cards (icon on top, name middle, state/
# dropdown at bottom) so all three share the same shape.
#
# Requires (install via HACS → Frontend):
#   - button-card   (https://github.com/custom-cards/button-card)
#   - Mushroom      (https://github.com/piitaya/lovelace-mushroom)

type: vertical-stack
cards:
- type: heading
  heading: HDMI Matrix
  icon: mdi:video-switch
  heading_style: title
- type: horizontal-stack
  cards:
  - type: custom:mushroom-entity-card
    entity: switch.hdmi_matrix_power
    name: Power
    icon: mdi:power
    icon_color: amber
    layout: vertical
    fill_container: true
    primary_info: name
    secondary_info: state
    tap_action:
      action: toggle
  - type: custom:mushroom-entity-card
    entity: button.hdmi_matrix_mute_all_outputs
    name: Mute all
    icon: mdi:volume-off
    icon_color: orange
    layout: vertical
    fill_container: true
    primary_info: name
    secondary_info: none
    tap_action:
      action: call-service
      service: button.press
      target:
        entity_id: button.hdmi_matrix_mute_all_outputs
  - type: custom:mushroom-select-card
    entity: select.hdmi_matrix_recall_preset
    name: Preset
    icon: mdi:folder-play
    icon_color: purple
    layout: vertical
    fill_container: true
    primary_info: name
    secondary_info: none
- type: grid
  columns: 6
  square: false
  cards:
  - type: custom:button-card
    show_icon: false
    show_name: false
    styles:
      card:
      - background: transparent
      - box-shadow: none
      - padding: 8px
      state:
      - font-weight: bold
      - font-size: 15px
      - text-transform: none
    show_state: false
    show_label: true
    label: ' '
  - type: custom:button-card
    show_icon: false
    show_name: false
    styles:
      card:
      - background: transparent
      - box-shadow: none
      - padding: 8px
      state:
      - font-weight: bold
      - font-size: 15px
      - text-transform: none
    entity: text.hdmi_matrix_input_1_label
    show_state: true
  - type: custom:button-card
    show_icon: false
    show_name: false
    styles:
      card:
      - background: transparent
      - box-shadow: none
      - padding: 8px
      state:
      - font-weight: bold
      - font-size: 15px
      - text-transform: none
    entity: text.hdmi_matrix_input_2_label
    show_state: true
  - type: custom:button-card
    show_icon: false
    show_name: false
    styles:
      card:
      - background: transparent
      - box-shadow: none
      - padding: 8px
      state:
      - font-weight: bold
      - font-size: 15px
      - text-transform: none
    entity: text.hdmi_matrix_input_3_label
